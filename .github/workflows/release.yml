name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: Existing version tag to publish to GitHub Releases, Homebrew, and npm
        required: true
        type: string

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  tag:
    if: github.event_name == 'push'
    runs-on: dependabot
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout pushed code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Create next patch tag
        id: tag
        env:
          TARGET_SHA: ${{ github.sha }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for attempt in {1..5}; do
            git fetch --force --tags origin
            latest_tag="$(git tag --list 'v*.*.*' --sort=-version:refname \
              | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
              | head -n 1 || true)"

            if [[ -z "$latest_tag" ]]; then
              tag="v0.0.1"
            elif [[ "$latest_tag" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              tag="v${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.$((BASH_REMATCH[3] + 1))"
            else
              echo "Latest version tag is invalid: $latest_tag" >&2
              exit 1
            fi

            git tag --annotate "$tag" --message "$tag" "$TARGET_SHA"

            if git push origin "refs/tags/$tag"; then
              echo "tag=$tag" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            git tag --delete "$tag"
            echo "Tag $tag was created concurrently; retrying ($attempt/5)" >&2
          done

          echo "Unable to create a unique patch tag after 5 attempts" >&2
          exit 1

  update-homebrew:
    needs:
      - tag
    if: >-
      always() &&
      ((github.event_name == 'push' && needs.tag.result == 'success') ||
       github.event_name == 'workflow_dispatch')
    runs-on: dependabot
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: release
        env:
          EVENT_NAME: ${{ github.event_name }}
          PUSH_TAG: ${{ needs.tag.outputs.tag }}
          MANUAL_TAG: ${{ inputs.tag }}
        run: |
          if [[ "$EVENT_NAME" == "push" ]]; then
            tag="$PUSH_TAG"
          else
            tag="$MANUAL_TAG"
          fi

          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must match vMAJOR.MINOR.PATCH: $tag" >&2
            exit 1
          fi

          git fetch --force --tags origin
          if ! git rev-parse --verify --quiet "refs/tags/$tag" >/dev/null; then
            echo "Release tag does not exist: $tag" >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: actions/github-script@v8
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = process.env.RELEASE_TAG;

            try {
              await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              core.info(`GitHub release ${tag} already exists; skipping creation.`);
              return;
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: tag,
              generate_release_notes: true,
            });

      - name: Update Homebrew formula
        uses: mislav/bump-homebrew-formula-action@v4
        with:
          formula-name: ai-development-environment
          tag-name: ${{ steps.release.outputs.tag }}
          download-url: https://github.com/bludesign/ai-development-environment/archive/refs/tags/${{ steps.release.outputs.tag }}.tar.gz
          homebrew-tap: bludesign/homebrew-ai-development-environment
          base-branch: main
          create-pullrequest: false
          create-branch: false
        env:
          COMMITTER_TOKEN: ${{ secrets.COMMITTER_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update control agent formula
        uses: actions/github-script@v8
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        with:
          github-token: ${{ secrets.COMMITTER_TOKEN }}
          script: |
            const crypto = require("node:crypto");
            const owner = "bludesign";
            const repo = "homebrew-ai-development-environment";
            const path = "Formula/control-agent.rb";
            const branch = "main";
            const tag = process.env.RELEASE_TAG;
            const url = `https://github.com/${context.repo.owner}/${context.repo.repo}/archive/refs/tags/${tag}.tar.gz`;

            const archive = await fetch(url);
            if (!archive.ok) {
              throw new Error(`Unable to download ${url}: ${archive.status} ${archive.statusText}`);
            }
            const sha256 = crypto
              .createHash("sha256")
              .update(Buffer.from(await archive.arrayBuffer()))
              .digest("hex");

            const response = await github.rest.repos.getContent({
              owner,
              repo,
              path,
              ref: branch,
            });
            if (Array.isArray(response.data) || response.data.type !== "file") {
              throw new Error(`${path} is not a file`);
            }

            let formula = Buffer.from(response.data.content, "base64").toString("utf8");
            const urlLine = `  url "${url}"`;
            const shaLine = `  sha256 "${sha256}"`;

            if (/^  url ".*"$/m.test(formula)) {
              formula = formula.replace(/^  url ".*"$/m, urlLine);
            } else {
              formula = formula.replace(
                /^(  homepage ".*"$)/m,
                `$1\n${urlLine}`,
              );
            }

            if (/^  sha256 ".*"$/m.test(formula)) {
              formula = formula.replace(/^  sha256 ".*"$/m, shaLine);
            } else {
              formula = formula.replace(urlLine, `${urlLine}\n${shaLine}`);
            }

            await github.rest.repos.createOrUpdateFileContents({
              owner,
              repo,
              path,
              branch,
              sha: response.data.sha,
              message: `control-agent ${tag.replace(/^v/, "")}`,
              content: Buffer.from(formula).toString("base64"),
            });

  publish-npm:
    needs:
      - tag
    if: >-
      always() &&
      ((github.event_name == 'push' && needs.tag.result == 'success') ||
       github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: release
        env:
          EVENT_NAME: ${{ github.event_name }}
          PUSH_TAG: ${{ needs.tag.outputs.tag }}
          MANUAL_TAG: ${{ inputs.tag }}
        run: |
          if [[ "$EVENT_NAME" == "push" ]]; then
            tag="$PUSH_TAG"
          else
            tag="$MANUAL_TAG"
          fi

          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must match vMAJOR.MINOR.PATCH: $tag" >&2
            exit 1
          fi

          git fetch --force --tags origin
          if ! git rev-parse --verify --quiet "refs/tags/$tag" >/dev/null; then
            echo "Release tag does not exist: $tag" >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Checkout release tag
        run: git checkout "refs/tags/${{ steps.release.outputs.tag }}"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build server
        run: npm run build

      - name: Build control agent
        run: npm run agent:build

      - name: Stage server package
        run: node scripts/prepare-npm-server-package.mjs --version "${{ steps.release.outputs.version }}"

      - name: Set control-agent version from tag
        working-directory: packages/control-agent
        run: npm version "${{ steps.release.outputs.version }}" --no-git-tag-version

      - name: Publish server
        working-directory: .npm-staging/server
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish control-agent
        working-directory: packages/control-agent
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
