enum GitHubPullRequestScope {
  MINE
  REVIEW_REQUESTED
  REPOSITORY
}

enum GitHubPullRequestState {
  OPEN
  CLOSED
  MERGED
}

enum GitHubPullRequestStateFilter {
  ALL
  OPEN
  CLOSED
  MERGED
}

enum GitHubPipelineStatus {
  ERROR
  EXPECTED
  FAILURE
  PENDING
  SUCCESS
  NONE
}

enum GitHubPipelineState {
  ACTION_REQUIRED
  CANCELLED
  ERROR
  EXPECTED
  FAILURE
  IN_PROGRESS
  NEUTRAL
  PENDING
  QUEUED
  SKIPPED
  STALE
  STARTUP_FAILURE
  SUCCESS
  TIMED_OUT
  NONE
}

enum GitHubReviewDecision {
  APPROVED
  CHANGES_REQUESTED
  REVIEW_REQUIRED
  NONE
}

enum GitHubMergeMethod {
  MERGE
  REBASE
  SQUASH
}

enum GitHubPipelineRetryUnavailableReason {
  GITHUB_APP_NOT_CONFIGURED
  NOT_COMPLETED
  NOT_GITHUB_ACTIONS
  WORKFLOW_RUN_UNAVAILABLE
  HISTORICAL_ATTEMPT
}

type GitHubSettings {
  tokenConfigured: Boolean!
  defaultJiraKeyRegex: String!
  updatedAt: String!
}

type GitHubAppSettings {
  configured: Boolean!
  appId: String
  installationId: String
  privateKeyConfigured: Boolean!
  keyFingerprint: String
  appSlug: String
  accountLogin: String
  repositorySelection: String
  actionsPermission: String
  verifiedAt: String
  updatedAt: String
}

type GitHubViewer {
  login: String!
  name: String
  avatarUrl: String!
  url: String!
}

type GitHubRepository {
  id: ID!
  githubId: ID!
  owner: String!
  name: String!
  nameWithOwner: String!
  url: String!
  jiraKeyRegex: String
}

type GitHubRepositoryCandidate {
  githubId: ID!
  nameWithOwner: String!
  url: String!
  isPrivate: Boolean!
  managed: Boolean!
}

type GitHubRepositoryCandidatePage {
  items: [GitHubRepositoryCandidate!]!
  hasNextPage: Boolean!
  endCursor: String
}

type GitHubPullRequest {
  id: ID!
  number: Int!
  title: String!
  url: String!
  repositoryGithubId: ID!
  repositoryNameWithOwner: String!
  repositoryUrl: String!
  labels: [String!]!
  jiraKey: String
  pipelineStatus: GitHubPipelineStatus!
  pipelines: [GitHubPipeline!]!
  reviewDecision: GitHubReviewDecision!
  unresolvedReviewThreadCount: Int!
  state: GitHubPullRequestState!
  headRefName: String!
  createdAt: String!
}

type GitHubPipeline {
  id: ID!
  name: String!
  status: GitHubPipelineState!
  url: String
  checkSuiteId: ID
  canRetry: Boolean!
  retryUnavailableReason: GitHubPipelineRetryUnavailableReason
  jobs: [GitHubWorkflowJob!]!
  workflowRunId: ID
  workflowId: ID
  runNumber: Int
  runAttempt: Int
}

type GitHubWorkflowJobStep {
  number: Int!
  name: String!
  status: GitHubPipelineState!
}

type GitHubWorkflowJob {
  id: ID!
  name: String!
  status: GitHubPipelineState!
  url: String
  canRetry: Boolean!
  retryUnavailableReason: GitHubPipelineRetryUnavailableReason
  steps: [GitHubWorkflowJobStep!]!
  runAttempt: Int
}

type GitHubActionsRepository {
  id: ID!
  nameWithOwner: String!
  url: String!
}

type GitHubActionsRepositoryError {
  codebaseRepositoryId: ID!
  nameWithOwner: String!
  message: String!
}

type GitHubActionsPullRequest {
  number: Int!
  url: String!
}

type GitHubActionsWorkflowRun {
  id: ID!
  workflowId: ID!
  repositoryGithubId: ID!
  codebaseRepositoryId: ID!
  repositoryNameWithOwner: String!
  repositoryUrl: String!
  name: String!
  displayTitle: String!
  runNumber: Int!
  runAttempt: Int!
  event: String!
  status: GitHubPipelineState!
  url: String!
  headBranch: String
  headSha: String!
  checkSuiteId: ID
  canRetry: Boolean!
  retryUnavailableReason: GitHubPipelineRetryUnavailableReason
  pullRequests: [GitHubActionsPullRequest!]!
  jiraKey: String
  worktreeId: ID
  startedAt: String!
  createdAt: String!
  updatedAt: String!
}

type GitHubWorkflowRunAttempt {
  workflowRunId: ID!
  runAttempt: Int!
  status: GitHubPipelineState!
  url: String!
  triggeringActor: GitHubWorkflowRunActor
  startedAt: String!
  createdAt: String!
  updatedAt: String!
  jobs: [GitHubWorkflowJob!]!
}

type GitHubWorkflowRunActor {
  login: String!
  avatarUrl: String!
  url: String!
}

type GitHubRepositoryWorkflow {
  id: ID!
  name: String!
  path: String!
  state: String!
  url: String!
  jobNames: [String!]!
}

enum GitHubAutoRetryScope {
  WORKFLOW_RUN
  WORKTREE_BRANCH
  PULL_REQUEST
  REPOSITORY
}

enum GitHubAutoRetryMode {
  COUNT
  FAILURE
}

enum GitHubAutoRetryFailureStrategy {
  FAILED_JOBS
  ALL_JOBS
}

enum GitHubAutoRetryRuleStatus {
  ACTIVE
  PAUSED
  COMPLETED
  EXHAUSTED
  ERROR
}

type GitHubAutoRetryTarget {
  id: ID!
  workflowId: ID
  workflowRunId: ID
  jobName: String
}

type GitHubAutoRetryExecution {
  id: ID!
  workflowRunId: ID!
  workflowId: ID!
  targetKey: String!
  status: String!
  observedAttempt: Int!
  automaticRetries: Int!
  lastStatus: GitHubPipelineState
  lastError: String
  updatedAt: String!
}

type GitHubAutoRetryRule {
  id: ID!
  scope: GitHubAutoRetryScope!
  codebaseRepositoryId: ID!
  repositoryGithubId: ID
  worktreeId: ID
  branch: String
  pullRequestNumber: Int
  allWorkflows: Boolean!
  mode: GitHubAutoRetryMode!
  retryLimit: Int
  failureStrategy: GitHubAutoRetryFailureStrategy!
  status: GitHubAutoRetryRuleStatus!
  enabled: Boolean!
  lastError: String
  targets: [GitHubAutoRetryTarget!]!
  executions: [GitHubAutoRetryExecution!]!
  createdAt: String!
  updatedAt: String!
}

input GitHubAutoRetryTargetInput {
  workflowId: ID
  workflowRunId: ID
  jobName: String
}

input SaveGitHubAutoRetryRuleInput {
  id: ID
  scope: GitHubAutoRetryScope!
  codebaseRepositoryId: ID!
  repositoryGithubId: ID
  worktreeId: ID
  branch: String
  pullRequestNumber: Int
  allWorkflows: Boolean!
  mode: GitHubAutoRetryMode!
  retryLimit: Int
  failureStrategy: GitHubAutoRetryFailureStrategy!
  targets: [GitHubAutoRetryTargetInput!]!
}

type GitHubActionsWorkflowRunPage {
  items: [GitHubActionsWorkflowRun!]!
  repositories: [GitHubActionsRepository!]!
  repositoryErrors: [GitHubActionsRepositoryError!]!
  hasNextPage: Boolean!
  endCursor: String
}

type GitHubPullRequestActor {
  login: String!
  avatarUrl: String!
  url: String!
}

type GitHubReviewComment {
  id: ID!
  body: String!
  bodyText: String!
  bodyHtml: String!
  url: String!
  author: GitHubPullRequestActor
  createdAt: String!
  updatedAt: String!
}

type GitHubReviewThreadPullRequest {
  id: ID!
  number: Int!
  title: String!
  url: String!
  repositoryNameWithOwner: String!
}

type GitHubReviewThread {
  id: ID!
  isResolved: Boolean!
  isOutdated: Boolean!
  subjectType: String!
  path: String!
  line: Int
  startLine: Int
  originalLine: Int
  originalStartLine: Int
  viewerCanReply: Boolean!
  viewerCanResolve: Boolean!
  viewerCanUnresolve: Boolean!
  resolvedBy: GitHubPullRequestActor
  pullRequest: GitHubReviewThreadPullRequest!
  rootComment: GitHubReviewComment!
  replies: [GitHubReviewComment!]!
}

type GitHubReviewThreadPage {
  viewerLogin: String!
  pullRequests: [GitHubReviewThreadPullRequest!]!
  threads: [GitHubReviewThread!]!
  truncated: Boolean!
}

type GitHubReviewThreadState {
  id: ID!
  isResolved: Boolean!
  viewerCanResolve: Boolean!
  viewerCanUnresolve: Boolean!
  resolvedBy: GitHubPullRequestActor
}

type GitHubPullRequestDetail {
  id: ID!
  codebaseRepositoryId: ID
  number: Int!
  title: String!
  url: String!
  repositoryGithubId: ID!
  repositoryNameWithOwner: String!
  repositoryUrl: String!
  labels: [String!]!
  jiraKey: String
  pipelineStatus: GitHubPipelineStatus!
  pipelines: [GitHubPipeline!]!
  reviewDecision: GitHubReviewDecision!
  unresolvedReviewThreadCount: Int!
  createdAt: String!
  body: String!
  bodyHtml: String!
  author: GitHubPullRequestActor
  assignees: [GitHubPullRequestActor!]!
  reviewThreads: [GitHubReviewThread!]!
  baseRefName: String!
  headRefName: String!
  state: String!
  isDraft: Boolean!
  mergeable: String!
  additions: Int!
  deletions: Int!
  changedFiles: Int
  commitCount: Int!
  updatedAt: String!
  mergedAt: String
  worktreeId: ID
}

type GitHubPullRequestMergeOptions {
  availableMethods: [GitHubMergeMethod!]!
  commitEmails: [String!]!
  defaultCommitEmail: String
  defaultCommitHeadline: String!
  defaultCommitBody: String!
  canMerge: Boolean!
  blockedReason: String
}

type GitHubPullRequestMergeResult {
  id: ID!
  state: String!
  url: String!
  mergedAt: String
}

type GitHubPullRequestPage {
  items: [GitHubPullRequest!]!
  truncated: Boolean!
  hasNextPage: Boolean!
  endCursor: String
}

input SaveGitHubSettingsInput {
  apiToken: String
  defaultJiraKeyRegex: String
}

input SaveGitHubAppSettingsInput {
  appId: String!
  installationId: String!
  privateKey: String
}

input AddGitHubRepositoryInput {
  nameWithOwner: String!
  jiraKeyRegex: String
}

input UpdateGitHubRepositoryInput {
  id: ID!
  jiraKeyRegex: String
}

input MergeGitHubPullRequestInput {
  owner: String!
  name: String!
  number: Int!
  method: GitHubMergeMethod!
  commitHeadline: String!
  commitBody: String!
  authorEmail: String
}

extend type Query {
  githubSettings: GitHubSettings!
  githubAppSettings: GitHubAppSettings!
  githubRepositories: [GitHubRepository!]!
  githubAvailableRepositories(after: String): GitHubRepositoryCandidatePage!
  githubActionsWorkflowRuns(
    codebaseRepositoryId: ID
    branch: String
    first: Int = 25
    after: String
  ): GitHubActionsWorkflowRunPage!
  githubActionsWorkflowJobs(
    codebaseRepositoryId: ID!
    workflowRunId: ID!
  ): [GitHubWorkflowJob!]!
  githubActionsWorkflowRunAttempt(
    repositoryId: ID!
    workflowRunId: ID!
    attempt: Int!
  ): GitHubWorkflowRunAttempt!
  githubWorktreeWorkflowRuns(worktreeId: ID!): [GitHubActionsWorkflowRun!]!
  githubRepositoryWorkflows(
    codebaseRepositoryId: ID!
  ): [GitHubRepositoryWorkflow!]!
  githubAutoRetryRules(
    codebaseRepositoryId: ID
    workflowRunId: ID
  ): [GitHubAutoRetryRule!]!
  githubPullRequests(
    scope: GitHubPullRequestScope!
    repositoryId: ID
    state: GitHubPullRequestStateFilter = OPEN
    first: Int = 25
    after: String
  ): GitHubPullRequestPage!
  githubPullRequest(
    owner: String!
    name: String!
    number: Int!
  ): GitHubPullRequestDetail
  githubPullRequestMergeOptions(
    owner: String!
    name: String!
    number: Int!
  ): GitHubPullRequestMergeOptions!
  githubReviewThreads: GitHubReviewThreadPage!
}

extend type Mutation {
  saveGitHubSettings(input: SaveGitHubSettingsInput!): GitHubSettings!
  saveGitHubAppSettings(input: SaveGitHubAppSettingsInput!): GitHubAppSettings!
  testGitHubConnection: GitHubViewer!
  testGitHubAppConnection: GitHubAppSettings!
  clearGitHubCredentials: GitHubSettings!
  clearGitHubAppCredentials: GitHubAppSettings!
  addGitHubRepository(input: AddGitHubRepositoryInput!): [GitHubRepository!]!
  updateGitHubRepository(
    input: UpdateGitHubRepositoryInput!
  ): [GitHubRepository!]!
  removeGitHubRepository(id: ID!): [GitHubRepository!]!
  mergeGitHubPullRequest(
    input: MergeGitHubPullRequestInput!
  ): GitHubPullRequestMergeResult!
  retryGitHubPipeline(repositoryId: ID!, checkSuiteId: ID!): GitHubPipeline!
  retryGitHubWorkflowJob(
    repositoryId: ID!
    checkSuiteId: ID!
    jobId: ID!
  ): Boolean!
  cancelGitHubActionsWorkflowRun(
    codebaseRepositoryId: ID!
    workflowRunId: ID!
    force: Boolean! = false
  ): Boolean!
  saveGitHubAutoRetryRule(
    input: SaveGitHubAutoRetryRuleInput!
  ): GitHubAutoRetryRule!
  setGitHubAutoRetryRuleEnabled(
    id: ID!
    enabled: Boolean!
  ): GitHubAutoRetryRule!
  deleteGitHubAutoRetryRule(id: ID!): Boolean!
  replyToGitHubReviewThread(threadId: ID!, body: String!): GitHubReviewComment!
  setGitHubReviewThreadResolved(
    threadId: ID!
    resolved: Boolean!
  ): GitHubReviewThreadState!
}
