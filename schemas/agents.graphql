scalar JSON

enum AgentConnectionStatus {
  ONLINE
  OFFLINE
}

enum AgentJobStatus {
  QUEUED
  RUNNING
  SUCCEEDED
  FAILED
  CANCELLED
  TIMED_OUT
}

enum AgentLogStream {
  STDOUT
  STDERR
  SYSTEM
}

enum DerivedDataLocationMode {
  DEFAULT
  ABSOLUTE
  RELATIVE
}

enum AgentEventType {
  JOB_AVAILABLE
  JOB_CANCEL_REQUESTED
  CODEBASE_RECONCILE_REQUESTED
  AGENT_CONFIGURATION_CHANGED
  RUN_COMMAND_AVAILABLE
}

type Agent {
  id: ID!
  name: String!
  hostname: String!
  version: String!
  osVersion: String!
  architecture: String!
  cpuModel: String
  memoryTotalBytes: Float
  memoryFreeBytes: Float
  diskTotalBytes: Float
  diskFreeBytes: Float
  capabilities: [String!]!
  baseRepoDirectory: String
  derivedDataLocationMode: DerivedDataLocationMode!
  derivedDataPath: String
  buildsDirectory: String
  defaultBuildsDirectory: String
  effectiveBuildsDirectory: String
  connectionStatus: AgentConnectionStatus!
  ipAddress: String
  lastSeenAt: String
  disconnectedAt: String
  createdAt: String!
  updatedAt: String!
}

type AgentEnrollmentToken {
  token: String!
  expiresAt: String!
}

type AgentCadenceSettings {
  agentId: ID!
  codebaseScanIntervalSeconds: Int!
  jobReconciliationIntervalSeconds: Int!
  gitFetchIntervalSeconds: Int!
  heartbeatIntervalSeconds: Int!
}

type SigningSecretTransfer {
  p12Base64: String!
  passphrase: String!
}

type EnrolledAgent {
  agent: Agent!
  credential: String!
}

type AgentJob {
  id: ID!
  agentId: ID!
  worktreeId: ID
  kind: String!
  payload: JSON!
  status: AgentJobStatus!
  idempotencyKey: String!
  result: JSON
  error: String
  timeoutSeconds: Int!
  createdAt: String!
  startedAt: String
  finishedAt: String
  updatedAt: String!
}

type AgentJobLog {
  id: ID!
  jobId: ID!
  sequence: Int!
  stream: AgentLogStream!
  message: String!
  createdAt: String!
}

type AgentEvent {
  type: AgentEventType!
  job: AgentJob
  runCommand: RunCommand
}

input EnrollAgentInput {
  enrollmentToken: String!
  name: String!
  hostname: String!
  version: String!
  osVersion: String!
  architecture: String!
  cpuModel: String
  memoryTotalBytes: Float
  memoryFreeBytes: Float
  diskTotalBytes: Float
  diskFreeBytes: Float
  capabilities: [String!]!
  defaultBuildsDirectory: String
}

input AgentHeartbeatInput {
  version: String!
  osVersion: String!
  architecture: String!
  cpuModel: String
  memoryTotalBytes: Float
  memoryFreeBytes: Float
  diskTotalBytes: Float
  diskFreeBytes: Float
  capabilities: [String!]!
  defaultBuildsDirectory: String
}

input UpdateAgentDerivedDataSettingsInput {
  mode: DerivedDataLocationMode!
  path: String
}

input UpdateAgentCadenceSettingsInput {
  codebaseScanIntervalSeconds: Int!
  jobReconciliationIntervalSeconds: Int!
  gitFetchIntervalSeconds: Int!
  heartbeatIntervalSeconds: Int!
}

input CreateAgentJobInput {
  agentId: ID!
  kind: String!
  payload: JSON!
  idempotencyKey: String!
  timeoutSeconds: Int = 86400
}

input AgentJobLogInput {
  sequence: Int!
  stream: AgentLogStream!
  message: String!
  createdAt: String!
}

extend type Query {
  agents: [Agent!]!
  agent(id: ID!): Agent
  agentSelf: Agent
  agentCadenceSettings(agentId: ID!): AgentCadenceSettings!
  agentJobs(agentId: ID!, limit: Int = 50): [AgentJob!]!
  agentJob(id: ID!): AgentJob
  agentJobLogs(jobId: ID!, afterSequence: Int = -1): [AgentJobLog!]!
}

type Mutation {
  createAgentEnrollmentToken(expiresInMinutes: Int = 15): AgentEnrollmentToken!
  enrollAgent(input: EnrollAgentInput!): EnrolledAgent!
  heartbeatAgent(input: AgentHeartbeatInput!): Agent!
  createAgentJob(input: CreateAgentJobInput!): AgentJob!
  claimAgentJob(jobId: ID!): AgentJob!
  claimSigningSecretTransfer(transferId: ID!): SigningSecretTransfer!
  appendAgentJobLogs(jobId: ID!, logs: [AgentJobLogInput!]!): [AgentJobLog!]!
  completeAgentJob(
    jobId: ID!
    status: AgentJobStatus!
    result: JSON
    error: String
  ): AgentJob!
  cancelAgentJob(jobId: ID!): AgentJob!
  requestAgentCodebaseReconcile(agentId: ID!): Boolean!
  updateAgentBaseRepoDirectory(agentId: ID!, baseRepoDirectory: String): Agent!
  updateAgentBuildsDirectory(agentId: ID!, buildsDirectory: String): Agent!
  updateAgentDerivedDataSettings(
    agentId: ID!
    input: UpdateAgentDerivedDataSettingsInput!
  ): Agent!
  updateAgentCadenceSettings(
    agentId: ID!
    input: UpdateAgentCadenceSettingsInput!
  ): AgentCadenceSettings!
  deleteAgent(agentId: ID!): Boolean!
}

type Subscription {
  agentEvents(agentId: ID!): AgentEvent!
  agentChanged(agentId: ID): Agent!
  agentJobChanged(jobId: ID!): AgentJob!
  agentJobLogAdded(jobId: ID!): AgentJobLog!
}
