"Credential backend selected for this server process."
enum CredentialStorageType {
  DATABASE
  VAULT
  KEYCHAIN
  UNKNOWN
}

"Overall credential-store health without probing external secret values."
enum CredentialStoreState {
  READY
  WARNING
  ERROR
}

"Protection applied by the selected credential backend."
enum CredentialEncryptionState {
  ENCRYPTED
  PLAINTEXT
  EXTERNAL
  ERROR
}

"Protection recorded for one credential item."
enum CredentialProtection {
  ENCRYPTED
  PLAINTEXT
  VAULT
  KEYCHAIN
}

"Stable, machine-readable credential-store warning."
enum CredentialStoreWarningCode {
  DATABASE_UNENCRYPTED
  CREDENTIAL_ENCRYPTION_KEY_INVALID
  CREDENTIAL_ENCRYPTION_KEY_MISSING
  CREDENTIAL_ENCRYPTION_KEY_MISMATCH
  CREDENTIAL_DATA_INVALID
  CREDENTIAL_STORAGE_TYPE_INVALID
  CREDENTIAL_STORE_UNAVAILABLE
  VAULT_CONFIGURATION_INVALID
  VAULT_INSECURE_HTTP
  VAULT_TLS_VERIFICATION_DISABLED
  KEYCHAIN_UNSUPPORTED_PLATFORM
  BACKEND_MISMATCH
}

"A safe, non-secret configuration detail."
type CredentialStoreDetail {
  label: String!
  value: String!
}

"A safe warning that never includes a secret or authentication header value."
type CredentialStoreWarning {
  code: CredentialStoreWarningCode!
  message: String!
}

"Current credential-store configuration and protection health."
type CredentialStoreStatus {
  storageType: CredentialStorageType!
  state: CredentialStoreState!
  encryptionState: CredentialEncryptionState!
  details: [CredentialStoreDetail!]!
  itemCount: Int!
  mismatchCount: Int!
  warnings: [CredentialStoreWarning!]!
}

"Metadata-only inventory entry. Secret payloads are never exposed by GraphQL."
type CredentialMetadata {
  id: ID!
  kind: String!
  ownerId: ID
  ownerFeature: String!
  storageType: CredentialStorageType!
  protection: CredentialProtection!
  createdAt: String!
  updatedAt: String!
}

extend type Query {
  credentialStoreStatus: CredentialStoreStatus!
  credentials: [CredentialMetadata!]!
}
