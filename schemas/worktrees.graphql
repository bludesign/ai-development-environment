enum WorktreeEditorVariant {
  CODE
  CODE_INSIDERS
  NONE
}

enum WorktreeOperation {
  OPEN_EDITOR
  FORCE_PUSH
  SYNC
  PUSH
  RESET
  STASH_ALL
  STAGE_ALL
  UNSTAGE_ALL
}

enum WorktreeBranchMode {
  NEW
  EXISTING
  TICKET
}

enum WorktreePushStatus {
  READY
  DIRTY
  DETACHED
  BEHIND
  DIVERGED
  UNKNOWN
}

enum WorktreeMoveDestinationMode {
  NEW
  EXISTING
}

enum WorktreeMoveStatus {
  PUSHING
  CHECKING_OUT
  AWAITING_STASH
  CLEANING_UP
  SUCCEEDED
  SUCCEEDED_WITH_WARNING
  FAILED
  CANCELLED
}

type WorktreeTag {
  id: ID!
  name: String!
  color: String!
  createdAt: String!
  updatedAt: String!
}

type WorktreeSettings {
  editorVariant: WorktreeEditorVariant!
  updatedAt: String!
}

type Worktree {
  id: ID!
  codebaseId: ID!
  gitDirectory: String!
  folder: String!
  relativePath: String!
  primary: Boolean!
  branch: String
  headSha: String
  upstream: String
  ahead: Int
  behind: Int
  syncState: CodebaseSyncState!
  baseBranch: String
  baseBranchOverride: String
  baseAhead: Int
  baseBehind: Int
  hasStagedChanges: Boolean!
  hasUnstagedChanges: Boolean!
  pushStatus: WorktreePushStatus!
  highlightColor: String
  availability: String!
  statusError: String
  ticketKey: String
  ticketTitle: String
  ticketStatus: String
  pullRequest: GitHubPullRequest
  tags: [WorktreeTag!]!
  activeJob: AgentJob
  lastCheckedAt: String
  missingAt: String
  createdAt: String!
  updatedAt: String!
}

type WorktreeCodebaseGroup {
  codebase: Codebase!
  repository: CodebaseRepository!
  worktrees: [Worktree!]!
}

type WorktreeAgentGroup {
  agent: Agent!
  codebases: [WorktreeCodebaseGroup!]!
}

type WorktreeOverview {
  agents: [WorktreeAgentGroup!]!
  tags: [WorktreeTag!]!
  settings: WorktreeSettings!
  hiddenCount: Int!
  activeMoves: [WorktreeMove!]!
}

type WorktreeMove {
  id: ID!
  sourceWorktreeId: ID!
  sourceCodebaseId: ID!
  targetCodebaseId: ID!
  targetWorktreeId: ID
  destinationMode: WorktreeMoveDestinationMode!
  branch: String!
  headSha: String!
  deleteSource: Boolean!
  status: WorktreeMoveStatus!
  sourceJobId: ID
  targetJobId: ID
  cleanupJobId: ID
  error: String
  warning: String
  createdAt: String!
  updatedAt: String!
  finishedAt: String
}

type WorktreeCommit {
  sha: String!
  subject: String!
  authorName: String!
  authoredAt: String!
  additions: Int!
  deletions: Int!
}

type WorktreeChange {
  path: String!
  staged: Boolean!
  unstaged: Boolean!
  untracked: Boolean!
  conflicted: Boolean!
  stagedAdditions: Int
  stagedDeletions: Int
  unstagedAdditions: Int
  unstagedDeletions: Int
}

type WorktreeDetail {
  commits: [WorktreeCommit!]!
  changes: [WorktreeChange!]!
  commitsTruncated: Boolean!
  changesTruncated: Boolean!
}

type WorktreeOverviewChange {
  worktreeId: ID
  codebaseId: ID
}

type WorktreeActivity {
  worktreeId: ID!
  branch: String
  headSha: String
  upstream: String
  ahead: Int
  behind: Int
  syncState: CodebaseSyncState
  baseAhead: Int
  baseBehind: Int
  hasStagedChanges: Boolean
  hasUnstagedChanges: Boolean
  observedAt: String!
}

type WorktreeTicketBranchPreview {
  ticketKey: ID!
  ticketTitle: String!
  ticketType: String
  projectKey: String!
  branchName: String!
}

input WorktreeInventoryInput {
  gitDirectory: String!
  folder: String!
  relativePath: String!
  primary: Boolean!
  branch: String
  headSha: String
  upstream: String
  ahead: Int
  behind: Int
  syncState: CodebaseSyncState!
  baseAhead: Int
  baseBehind: Int
  hasStagedChanges: Boolean
  hasUnstagedChanges: Boolean
  pushStatus: WorktreePushStatus
  availability: String!
  error: String
  checkedAt: String!
}

input CodebaseWorktreeReportInput {
  codebaseId: ID!
  complete: Boolean!
  defaultBranch: String
  localBranches: [String!]!
  remoteBranches: [String!]!
  fetchedAt: String
  fetchAttemptedAt: String
  fetchError: String
  worktrees: [WorktreeInventoryInput!]!
}

input WorktreeActivityReportInput {
  codebaseId: ID!
  gitDirectory: String!
  branch: String
  headSha: String
  upstream: String
  ahead: Int
  behind: Int
  syncState: CodebaseSyncState
  baseAhead: Int
  baseBehind: Int
  hasStagedChanges: Boolean
  hasUnstagedChanges: Boolean
  pushStatus: WorktreePushStatus
  observedAt: String!
}

input SaveWorktreeTagInput {
  id: ID
  name: String!
  color: String!
}

input RunWorktreeOperationInput {
  worktreeId: ID!
  operation: WorktreeOperation!
  requestId: ID!
}

input WorktreeBranchSelectionInput {
  mode: WorktreeBranchMode!
  branchName: String
  ticketKey: ID
  baseBranch: String!
}

input PreviewWorktreeTicketBranchInput {
  codebaseId: ID!
  worktreeId: ID
  ticketKey: ID!
}

input CreateWorktreeInput {
  codebaseId: ID!
  selection: WorktreeBranchSelectionInput!
  requestId: ID!
}

input ChangeWorktreeBranchInput {
  worktreeId: ID!
  selection: WorktreeBranchSelectionInput!
  requestId: ID!
  stashOnFailure: Boolean = false
}

input MoveWorktreeInput {
  sourceWorktreeId: ID!
  targetCodebaseId: ID!
  targetWorktreeId: ID
  deleteSource: Boolean! = false
  requestId: ID!
}

input DeleteWorktreeInput {
  worktreeId: ID!
  deleteRemoteBranch: Boolean! = false
  requestId: ID!
}

extend type Query {
  worktreeOverview: WorktreeOverview!
  hiddenWorktrees: [Worktree!]!
  worktreeSettings: WorktreeSettings!
  previewWorktreeTicketBranch(
    input: PreviewWorktreeTicketBranchInput!
  ): WorktreeTicketBranchPreview!
  worktreeMove(id: ID!): WorktreeMove
}

extend type Mutation {
  refreshWorktrees: Int!
  reportWorktrees(reports: [CodebaseWorktreeReportInput!]!): [Worktree!]!
  reportWorktreeActivity(input: WorktreeActivityReportInput!): WorktreeActivity!
  inspectWorktree(id: ID!, requestId: ID!): WorktreeDetail!
  runWorktreeOperation(input: RunWorktreeOperationInput!): AgentJob!
  createWorktree(input: CreateWorktreeInput!): AgentJob!
  changeWorktreeBranch(input: ChangeWorktreeBranchInput!): AgentJob!
  moveWorktree(input: MoveWorktreeInput!): WorktreeMove!
  retryWorktreeMoveWithStash(id: ID!): WorktreeMove!
  cancelWorktreeMove(id: ID!): WorktreeMove!
  deleteWorktree(input: DeleteWorktreeInput!): AgentJob!
  updateWorktreeBaseBranch(id: ID!, baseBranch: String): Worktree!
  updateWorktreeHighlight(id: ID!, color: String): Worktree!
  setWorktreeTags(id: ID!, tagIds: [ID!]!): Worktree!
  saveWorktreeTag(input: SaveWorktreeTagInput!): WorktreeTag!
  deleteWorktreeTag(id: ID!): Boolean!
  saveWorktreeSettings(editorVariant: WorktreeEditorVariant!): WorktreeSettings!
  purgeHiddenWorktree(id: ID!): Boolean!
  purgeAllHiddenWorktrees: Int!
}

extend type Subscription {
  worktreeOverviewChanged: WorktreeOverviewChange!
  worktreeInspectionChanged(worktreeId: ID!): WorktreeActivity!
}
