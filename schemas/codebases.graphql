enum CodebaseSyncState {
  IN_SYNC
  AHEAD
  BEHIND
  DIVERGED
  NO_UPSTREAM
  DETACHED
  UNKNOWN
}

enum CodebaseAvailability {
  AVAILABLE
  MISSING
  NOT_REPOSITORY
  ORIGIN_MISMATCH
  ERROR
}

type CodebaseRepository {
  id: ID!
  canonicalOrigin: String!
  displayOrigin: String!
  name: String!
  description: String!
  jiraBranchRegex: String
  keepBaseBranchUpToDate: Boolean!
  codebases: [Codebase!]!
  createdAt: String!
  updatedAt: String!
}

type Codebase {
  id: ID!
  folder: String!
  observedOrigin: String!
  branch: String
  headSha: String
  upstream: String
  ahead: Int
  behind: Int
  syncState: CodebaseSyncState!
  availability: CodebaseAvailability!
  statusError: String
  defaultBranch: String
  remoteBranches: [String!]!
  lastCheckedAt: String
  lastFetchedAt: String
  lastFetchAttemptAt: String
  lastFetchError: String
  createdAt: String!
  updatedAt: String!
  agent: Agent!
  repository: CodebaseRepository!
  activeJob: AgentJob
}

type CodebaseDirectoryEntry {
  name: String!
  path: String!
  hidden: Boolean!
}

type CodebaseDirectoryListing {
  path: String!
  parentPath: String
  homePath: String!
  entries: [CodebaseDirectoryEntry!]!
  truncated: Boolean!
}

type CodebaseSnapshot {
  folder: String!
  observedOrigin: String
  canonicalOrigin: String
  displayOrigin: String
  branch: String
  headSha: String
  upstream: String
  ahead: Int
  behind: Int
  syncState: CodebaseSyncState!
  availability: CodebaseAvailability!
  error: String
  checkedAt: String!
  fetchedAt: String
  linkedWorktree: Boolean!
}

type CodebaseInspection {
  jobId: ID!
  snapshot: CodebaseSnapshot!
  existingRepository: CodebaseRepository
}

type CodebaseOverview {
  repositories: [CodebaseRepository!]!
}

type CodebaseSettings {
  refreshIntervalSeconds: Int!
  fetchIntervalSeconds: Int!
  defaultJiraBranchRegex: String!
  updatedAt: String!
}

type AgentCodebaseRegistration {
  id: ID!
  folder: String!
  canonicalOrigin: String!
  defaultBranch: String
  keepBaseBranchUpToDate: Boolean!
  lastFetchedAt: String
  lastFetchAttemptAt: String
  worktrees: [AgentWorktreeConfiguration!]!
}

type AgentWorktreeConfiguration {
  gitDirectory: String!
  baseBranchOverride: String
}

type AgentCodebaseConfiguration {
  refreshIntervalSeconds: Int!
  fetchIntervalSeconds: Int!
  codebases: [AgentCodebaseRegistration!]!
}

type CodebaseOperationSkip {
  codebaseId: ID!
  reason: String!
}

type CodebaseOperationBatch {
  jobs: [AgentJob!]!
  skipped: [CodebaseOperationSkip!]!
}

type CodebaseRemoval {
  id: ID!
  repositoryId: ID!
  repositoryRemoved: Boolean!
}

type CodebaseOverviewChange {
  codebaseId: ID
  repositoryId: ID
}

input BrowseAgentDirectoryInput {
  agentId: ID!
  path: String
  requestId: ID!
}

input InspectAgentCodebaseInput {
  agentId: ID!
  folder: String!
  requestId: ID!
}

input ConfirmCodebaseInput {
  inspectionJobId: ID!
  name: String
  description: String
}

input UpdateCodebaseRepositoryInput {
  id: ID!
  name: String!
  description: String!
  jiraBranchRegex: String
  keepBaseBranchUpToDate: Boolean!
}

input UpdateCodebaseSettingsInput {
  refreshIntervalSeconds: Int!
  fetchIntervalSeconds: Int!
  defaultJiraBranchRegex: String!
}

input RunCodebaseOperationInput {
  codebaseIds: [ID!]!
  requestId: ID!
}

input CodebaseSnapshotInput {
  folder: String!
  observedOrigin: String
  canonicalOrigin: String
  displayOrigin: String
  branch: String
  headSha: String
  upstream: String
  ahead: Int
  behind: Int
  syncState: CodebaseSyncState!
  availability: CodebaseAvailability!
  error: String
  checkedAt: String!
  fetchedAt: String
  linkedWorktree: Boolean!
}

input CodebaseStatusReportInput {
  codebaseId: ID!
  snapshot: CodebaseSnapshotInput!
}

extend type Query {
  codebaseOverview: CodebaseOverview!
  codebaseSettings: CodebaseSettings!
  agentCodebases: [AgentCodebaseRegistration!]!
  agentCodebaseConfiguration: AgentCodebaseConfiguration!
}

extend type Mutation {
  browseAgentDirectory(
    input: BrowseAgentDirectoryInput!
  ): CodebaseDirectoryListing!
  inspectAgentCodebase(input: InspectAgentCodebaseInput!): CodebaseInspection!
  confirmCodebase(input: ConfirmCodebaseInput!): Codebase!
  updateCodebaseRepository(
    input: UpdateCodebaseRepositoryInput!
  ): CodebaseRepository!
  updateCodebaseSettings(input: UpdateCodebaseSettingsInput!): CodebaseSettings!
  removeCodebase(id: ID!): CodebaseRemoval!
  refreshCodebases(input: RunCodebaseOperationInput!): CodebaseOperationBatch!
  fetchCodebases(input: RunCodebaseOperationInput!): CodebaseOperationBatch!
  reportCodebaseStatuses(reports: [CodebaseStatusReportInput!]!): [Codebase!]!
}

extend type Subscription {
  codebaseOverviewChanged: CodebaseOverviewChange!
}
